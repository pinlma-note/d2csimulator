<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D2C Strategy Dashboard V3</title>
  <style>
    :root {
      --primary: #2c3e50; --accent: #3498db; --success: #27ae60;
      --warning: #f39c12; --danger: #e74c3c; --bg: #f4f7f9; --card-bg: #ffffff;
    }
    body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: var(--bg); color: var(--primary); margin: 0; padding: 20px; font-size: 14px; }
    
    .container { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 1fr 360px; gap: 20px; }
    header { grid-column: 1 / -1; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
    
    .card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .card h3 { margin-top: 0; font-size: 16px; display: flex; align-items: center; gap: 8px; color: var(--primary); }
    .card-accent { border-top: 4px solid var(--accent); }
    
    /* 情報の強弱設定 */
    .section-title { font-size: 12px; color: #7f8c8d; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group label { font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #555; }
    .form-group input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; text-align: right; }

    .sidebar { position: sticky; top: 20px; height: fit-content; }
    .stat-card { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }
    .stat-card.main { background: var(--primary); color: #fff; }
    .stat-val { font-size: 24px; font-weight: bold; display: block; margin-top: 5px; }
    
    button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%; }
    .btn-calc { background: var(--success); color: white; margin-bottom: 10px; font-size: 16px; }
    .btn-csv { background: #eee; color: #333; }

    /* テーブル */
    .table-wrapper { overflow-x: auto; background: #fff; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 900px; }
    th, td { border: 1px solid #eee; padding: 8px; text-align: right; }
    th { background: #f8f9fa; color: #666; font-weight: bold; }
    .row-header { text-align: left; position: sticky; left: 0; background: #fff; font-weight: bold; z-index: 1; border-right: 2px solid #ddd; }
    .pos { color: var(--success); font-weight: bold; }
    .neg { color: var(--danger); font-weight: bold; }

    .month-inputs { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 5px; }
    .m-box { background: #f9f9f9; padding: 4px; border-radius: 4px; border: 1px solid #eee; text-align: center; }
    .m-box span { font-size: 9px; color: #999; }
    .m-box input { width: 100%; border: none; background: transparent; text-align: center; font-weight: bold; }

    details { background: #fff; border-radius: 8px; margin-bottom: 15px; border: 1px solid #eee; }
    summary { padding: 15px; font-weight: bold; cursor: pointer; color: var(--accent); }
  </style>
</head>
<body>

<header>
  <h1>📊 D2C経営シミュレーター</h1>
  <div style="text-align: right;">
    <span style="font-size: 12px; color: #7f8c8d;">投資回収予測:</span>
    <span id="top_bep" style="font-size: 20px; font-weight: bold; color: var(--warning); ml-2">-</span> <small>ヶ月</small>
  </div>
</header>

<div class="container">
  <div class="main-content">
    
    <div class="section-title">おすすめ項目 (基本設定)</div>
    <div class="card card-accent">
      <h3>🛒 販売・単価・CPA</h3>
      <div class="form-grid">
        <div class="form-group"><label>初回販売価格(円)</label><input type="number" id="f_price" value="3000"></div>
        <div class="form-group"><label>新規獲得CPA(円)</label><input type="number" id="cpa" value="5000"></div>
        <div class="form-group"><label>2回目継続率(%)</label><input type="number" id="ret_2" value="82.0"></div>
        <div class="form-group"><label>3回目継続率(%)</label><input type="number" id="ret_3" value="81.0"></div>
        <div class="form-group"><label>定期販売価格(円)</label><input type="number" id="r_price" value="5000"></div>
      </div>
    </div>

    <details>
      <summary>⚙️ 詳細設定（コスト・出荷数量・4回目以降）</summary>
      <div style="padding: 0 15px 15px;">
        <div class="form-grid">
          <div class="form-group"><label>初回出荷数量(個/人)</label><input type="number" id="f_qty" value="1"></div>
          <div class="form-group"><label>定期出荷数量(個/人)</label><input type="number" id="r_qty" value="1"></div>
          <div class="form-group"><label>初回変動費(円/個)</label><input type="number" id="f_cost" value="1600"></div>
          <div class="form-group"><label>定期変動費(円/個)</label><input type="number" id="r_cost" value="1800"></div>
          <div class="form-group"><label>CRM費(売上の%)</label><input type="number" id="crm_rate" value="5"></div>
          <div class="form-group"><label>4回目継続率(%)</label><input type="number" id="ret_4" value="75.0"></div>
        </div>
      </div>
    </details>

    <div class="card card-accent">
      <h3>📣 新規獲得人数 (1-24ヶ月)</h3>
      <div style="margin-bottom: 10px; font-size: 12px; background: #f0f4f8; padding: 10px; border-radius: 8px;">
        一括設定: <input type="number" id="base_users" value="100" style="width:60px; padding:3px;">
        <button onclick="applySameUsers()" style="width:auto; padding:2px 10px; font-size:11px;">適用</button>
        / 25ヶ月以降: <input type="checkbox" id="auto_decay" checked> <label for="auto_decay">減衰継続モデル</label>
      </div>
      <div class="month-inputs" id="months_container"></div>
    </div>

    <div class="card">
      <h3>📈 おすすめ指標サマリー (年次)</h3>
      <div class="table-wrapper">
        <table id="yearly_table">
          <thead><tr><th class="row-header">項目</th><th>1年目</th><th>2年目</th><th>3年目</th><th>4年目</th><th>5年目</th></tr></thead>
          <tbody id="yearly_body"></tbody>
        </table>
      </div>
    </div>

    <details>
      <summary>🔍 詳細推移データを確認する (出荷数量・購入者数詳細)</summary>
      <div class="table-wrapper" style="padding: 10px;">
        <table id="monthly_table">
          <thead><tr id="m_header"><th class="row-header">項目</th></tr></thead>
          <tbody id="m_body"></tbody>
        </table>
      </div>
    </details>

  </div>

  <div class="sidebar">
    <div class="stat-card main">
      <span class="stat-label">5年後 累計利益</span>
      <span class="stat-val" id="res_y5">¥0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">累計新規客数 (5年)</span>
      <span class="stat-val" id="res_total_users">0人</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">投資回収 (BEP)</span>
      <span class="stat-val" id="res_bep" style="color: var(--warning);">未回収</span>
    </div>
    
    <button class="btn-calc" onclick="calculate()">シミュレーション実行</button>
    <button class="btn-csv" onclick="downloadCSV()">CSV保存</button>
  </div>
</div>

<script>
const masterRet = [100, 82, 81, 75, 85, 95, 95.25, 95.5, 95.75, 96, 96.25, 96.5, 95.76, 95.02, 94.28, 93.54, 92.8, 92.06, 91.41, 90.75, 90.1, 89.44, 88.79, 88.13, 91.58, 91.58, 91.58, 91.58, 91.58, 91.58, 91.58, 91.58, 91.57, 91.57, 91.57, 91.58, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5, 92.5];

const container = document.getElementById('months_container');
const m_header = document.getElementById('m_header');
for(let i=1; i<=24; i++){
  container.innerHTML += `<div class="m-box"><span>${i}月</span><input type="number" class="m-val" id="m${i}" value="100"></div>`;
  m_header.innerHTML += `<th>${i}月</th>`;
}

function applySameUsers(){
  const v = document.getElementById('base_users').value;
  document.querySelectorAll('.m-val').forEach(el => el.value = v);
}

function calculate(){
  // 入力取得
  const f_p = Number(document.getElementById('f_price').value), f_q = Number(document.getElementById('f_qty').value);
  const r_p = Number(document.getElementById('r_price').value), r_q = Number(document.getElementById('r_qty').value);
  const cpa = Number(document.getElementById('cpa').value), f_c = Number(document.getElementById('f_cost').value), r_c = Number(document.getElementById('r_cost').value);
  const crm = Number(document.getElementById('crm_rate').value) / 100;
  
  let curRet = [...masterRet];
  curRet[1] = Number(document.getElementById('ret_2').value);
  curRet[2] = Number(document.getElementById('ret_3').value);
  curRet[3] = Number(document.getElementById('ret_4').value);

  let newUsers = [];
  let totalNewUsers = 0;
  for(let i=1; i<=24; i++){
    let val = Number(document.getElementById(`m${i}`).value);
    newUsers.push(val); totalNewUsers += val;
  }
  
  const avgNew = totalNewUsers / 24;
  const isDecay = document.getElementById('auto_decay').checked;
  for(let m=25; m<=60; m++){
    let val = isDecay ? avgNew * (curRet[Math.min(m-1, 59)]/100) : 0;
    newUsers.push(val); totalNewUsers += val;
  }

  let cumNew = 0, cumShip = 0, cumProf = 0, bep = 0;
  let yearly = Array.from({length: 5}, () => ({rev: 0, prof: 0, new: 0, ship: 0}));
  let monthlyLog = [];

  for(let m=0; m<60; m++){
    let curNew = newUsers[m], curRep = 0;
    for(let p=0; p<m; p++){
      let surv = newUsers[p];
      for(let s=1; s<=(m-p); s++){ surv *= (curRet[Math.min(s, 59)]/100); }
      curRep += surv;
    }

    let shipQty = (curNew * f_q) + (curRep * r_q);
    let rev = (curNew * f_p) + (curRep * r_p);
    let cost = (curNew * f_q * f_c) + (curRep * r_q * r_c);
    let prof = rev - cost - (curNew * cpa) - (rev * crm);

    cumNew += curNew; cumShip += shipQty; cumProf += prof;
    if(cumProf > 0 && bep === 0) bep = m + 1;

    let yIdx = Math.floor(m/12);
    yearly[yIdx].rev += rev; yearly[yIdx].prof += prof;
    yearly[yIdx].new += curNew; yearly[yIdx].ship += shipQty;

    if(m < 24){
      monthlyLog.push({ new: curNew, rep: curRep, buyTotal: curNew + curRep, ship: shipQty, rev: rev, prof: prof, cumProf: cumProf, cumNew: cumNew, cumShip: cumShip });
    }
  }

  // 表示更新
  document.getElementById('res_y5').innerText = "¥" + Math.round(cumProf).toLocaleString();
  document.getElementById('res_total_users').innerText = Math.round(cumNew).toLocaleString() + "人";
  document.getElementById('res_bep').innerText = bep > 0 ? bep + " ヶ月" : "未回収";
  document.getElementById('top_bep').innerText = bep > 0 ? bep : "-";

  // 年次テーブル
  let yBody = "";
  const yLabels = ["累計売上", "累計利益", "累計新規購入者", "累計商品出荷数", "利益率"];
  for(let i=0; i<5; i++){
    yBody += `<tr><td class="row-header">${yLabels[i]}</td>`;
    let cR=0, cP=0, cN=0, cS=0;
    for(let y=0; y<5; y++){
      cR += yearly[y].rev; cP += yearly[y].prof; cN += yearly[y].new; cS += yearly[y].ship;
      if(i===0) yBody += `<td>¥${Math.round(cR).toLocaleString()}</td>`;
      else if(i===1) yBody += `<td class="${cP>=0?'pos':'neg'}">¥${Math.round(cP).toLocaleString()}</td>`;
      else if(i===2) yBody += `<td>${Math.round(cN).toLocaleString()}人</td>`;
      else if(i===3) yBody += `<td>${Math.round(cS).toLocaleString()}個</td>`;
      else yBody += `<td>${(cR>0?cP/cR*100:0).toFixed(1)}%</td>`;
    }
    yBody += `</tr>`;
  }
  document.getElementById('yearly_body').innerHTML = yBody;

  // 詳細月次テーブル
  let mBody = "";
  const mLabels = ["新規購入者数", "リピート購入者数", "単月購入者合計", "単月出荷数量", "累計新規購入者数", "累計出荷数量", "単月損益", "累計損益"];
  const mKeys = ["new", "rep", "buyTotal", "ship", "cumNew", "cumShip", "prof", "cumProf"];
  mKeys.forEach((key, idx) => {
    mBody += `<tr><td class="row-header">${mLabels[idx]}</td>`;
    monthlyLog.forEach(log => {
      let v = Math.round(log[key]);
      let txt = (key==='prof'||key==='cumProf') ? "¥"+v.toLocaleString() : v.toLocaleString();
      let cls = (key==='prof'||key==='cumProf') && v < 0 ? "neg" : ((key==='prof'||key==='cumProf') ? "pos" : "");
      mBody += `<td class="${cls}">${txt}</td>`;
    });
    mBody += `</tr>`;
  });
  document.getElementById('m_body').innerHTML = mBody;
}

function downloadCSV() {
  const getD = id => {
    let rs = [];
    document.getElementById(id).querySelectorAll('tr').forEach(tr => {
      let r = []; tr.querySelectorAll('th, td').forEach(td => r.push('"' + td.innerText.replace(/,/g,"").replace(/¥/g,"").replace(/人/g,"").replace(/個/g,"") + '"'));
      rs.push(r.join(","));
    });
    return rs;
  };
  let csv = ["--- SUMMARY ---"].concat(getD('yearly_table')).concat(["", "--- DETAILS ---"]).concat(getD('monthly_table')).join("\r\n");
  const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv' });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "d2c_report.csv"; a.click();
}

window.onload = calculate;
</script>

</body>
</html>
